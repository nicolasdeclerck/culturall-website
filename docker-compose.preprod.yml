# Override PRÉ-PRODUCTION
# Usage : docker compose -p culturall-website \
#           -f docker-compose.base.yml \
#           -f docker-compose.preprod.yml \
#           --env-file .env.preprod up -d
#
# Caractéristiques :
#   - Build local (pas de registry)
#   - Targets de build "production"
#   - Nginx inclus, sans SSL (HTTP uniquement)
#   - Données de test, mirror fidèle de la prod

services:
  django:
    build:
      target: production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media

  nextjs:
    build:
      target: production
    command: node server.js  # mode standalone Next.js

  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/preprod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      django:
        condition: service_started
      nextjs:
        condition: service_started

  postgres:
    volumes:
      - postgres_preprod_data:/var/lib/postgresql/data

  minio:
    volumes:
      - minio_preprod_data:/data

volumes:
  static_files:
  media_files:
  postgres_preprod_data:
  minio_preprod_data:
