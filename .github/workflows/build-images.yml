name: Build & Push Images

# Build des images Django et Next.js, push vers GHCR, puis déclenchement
# du workflow deploy-prod.yml avec le tag d'image à déployer.
#
# Placeholders à remplacer :
#   culturall-website : nom du repo (ex: studio-site)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write   # nécessaire pour déclencher deploy-prod.yml

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_PREFIX: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA::12}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push Django image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./docker/django/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/django:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/django:latest
          cache-from: type=gha,scope=django
          cache-to: type=gha,mode=max,scope=django

      - name: Build & push Next.js image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./docker/nextjs/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nextjs:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/nextjs:latest
          cache-from: type=gha,scope=nextjs
          cache-to: type=gha,mode=max,scope=nextjs

  trigger-deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy-prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-prod.yml \
            --repo ${{ github.repository }} \
            -f image_tag=${{ needs.build-and-push.outputs.image_tag }}
