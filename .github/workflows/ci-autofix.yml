name: CI Auto-Fix

# Declenche automatiquement quand le pipeline Build & Push Images echoue
# sur main. Lance un agent Claude pour analyser l'erreur, creer une issue
# et ouvrir une PR avec le fix.

on:
  workflow_run:
    workflows: ["Build & Push Images"]
    types: [completed]

permissions:
  issues: write
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: ci-autofix
  cancel-in-progress: true

jobs:
  autofix:
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:

      # --- Garde anti-boucle : skip si le commit est deja un autofix ---
      - name: Check for autofix commit
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }} --jq '.commit.message' || echo "")
          if echo "$COMMIT_MSG" | head -1 | grep -q '^\[ci-autofix\]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — failing commit is itself a ci-autofix"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Dedup : skip si une issue autofix ouverte existe deja pour ce SHA ---
      - name: Check for existing autofix issue
        if: steps.guard.outputs.skip == 'false'
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "ci-autofix" \
            --state open \
            --search "${{ github.event.workflow_run.head_sha }}" \
            --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping — open ci-autofix issue #$EXISTING already exists"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Verifier la session Claude MAX sur le VPS ---
      - name: Check Claude MAX session
        id: check-session
        if: steps.guard.outputs.skip == 'false' && steps.dedup.outputs.skip == 'false'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 2m
          script: |
            docker exec claude-worker claude --version 2>/dev/null && echo 'SESSION_OK' || (echo 'SESSION_KO' && exit 1)

      # --- Si session expiree, creer une issue de notification ---
      - name: Handle session expired
        if: >-
          steps.guard.outputs.skip == 'false'
          && steps.dedup.outputs.skip == 'false'
          && steps.check-session.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "[ci-autofix] Build echoue — session Claude expiree" \
            --label "ci-autofix,standby" \
            --body "## Build echoue — intervention manuelle requise

          **Run :** https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          **Commit :** ${{ github.event.workflow_run.head_sha }}

          La session Claude MAX sur \`claude-worker\` est expiree. Le fix automatique n'a pas pu etre lance.

          **Renouveler avec :**
          \`\`\`bash
          ssh ubuntu@vps
          docker exec -it claude-worker claude
          \`\`\`

          ---
          _Issue creee automatiquement par ci-autofix_"

      # --- Lancer Claude pour analyser et fixer ---
      - name: Run Claude auto-fix
        if: >-
          steps.guard.outputs.skip == 'false'
          && steps.dedup.outputs.skip == 'false'
          && steps.check-session.outcome == 'success'
        uses: appleboy/ssh-action@v1
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          envs: RUN_ID,HEAD_SHA,REPO
          script: |
            set -e

            # Extraire les logs d'echec dans le conteneur
            docker exec claude-worker bash -c \
              "gh run view $RUN_ID --repo $REPO --log-failed 2>&1 | tail -200 > /tmp/ci-failed-logs.txt"

            # Mettre a jour le clone interne
            docker exec claude-worker git -C /workspace/culturall-website fetch origin main
            docker exec claude-worker git -C /workspace/culturall-website reset --hard origin/main

            # Lancer Claude avec le skill ci-autofix
            FAILED_LOGS=$(docker exec claude-worker cat /tmp/ci-failed-logs.txt)

            printf 'Tu es un expert en developpement logiciel.\n\nExecute le skill .claude/skills/ci-autofix/SKILL.md.\n\nRun ID: %s\nCommit SHA: %s\nRepo: %s\n\nLogs de l'\''echec CI :\n```\n%s\n```' \
              "$RUN_ID" \
              "$HEAD_SHA" \
              "$REPO" \
              "$FAILED_LOGS" \
              | docker exec -i \
                -w /workspace/culturall-website \
                -e RUN_ID="$RUN_ID" \
                -e HEAD_SHA="$HEAD_SHA" \
                -e REPO="$REPO" \
                claude-worker \
                claude -p - --dangerously-skip-permissions --output-format json 2>&1
