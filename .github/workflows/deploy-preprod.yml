name: Deploy to Preprod

# Tire les images pré-buildées par build-images.yml depuis GHCR et les
# déploie sur le VPS de preprod (culturall-website.nickorp.com). PAS de
# build sur le VPS.
#
# Reverse proxy : Traefik EXTERNE (stack n8n-traefik partagé sur le VPS),
# réseau `n8n-traefik_default`. Les services s'enregistrent via labels.
#
# Déclenchements :
#   - Automatique : depuis build-images.yml (workflow_dispatch avec image_tag)
#     sur chaque push `main`
#   - Manuel via UI ou `gh workflow run`

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag des images à déployer (ex: a1b2c3d4e5f6 ou 'latest')"
        required: true
        default: "latest"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        with:
          host: ${{ secrets.PREPROD_VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.PREPROD_VPS_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            set -e
            cd ~/n8n-traefik/repos/culturall-website

            echo "==> Pulling latest compose files from main..."
            git pull origin main

            COMPOSE_CMD="docker compose -p culturall-website \
              -f docker-compose.base.yml \
              -f docker-compose.preprod.yml \
              --env-file .env.preprod"

            echo "==> Updating IMAGE_TAG in .env.preprod (current : $IMAGE_TAG)..."
            grep -q '^IMAGE_TAG=' .env.preprod \
              && sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=$IMAGE_TAG|" .env.preprod \
              || echo "IMAGE_TAG=$IMAGE_TAG" >> .env.preprod

            echo "==> Logging in to GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            echo "==> Pulling pre-built images..."
            $COMPOSE_CMD pull django nextjs

            echo "==> Restarting services with new images..."
            # nginx est désactivé en preprod (Traefik externe fait le reverse proxy)
            $COMPOSE_CMD up -d --force-recreate --no-build django nextjs minio postgres

            echo "==> Running Django/Wagtail migrations..."
            $COMPOSE_CMD exec -T django python manage.py migrate --noinput

            echo "==> Collecting static files..."
            $COMPOSE_CMD exec -T django python manage.py collectstatic --noinput

            echo "==> Updating Wagtail search index..."
            $COMPOSE_CMD exec -T django python manage.py update_index || true

            echo "==> Pruning old images..."
            docker image prune -af --filter "until=168h" || true

            echo "==> Deployment complete!"
