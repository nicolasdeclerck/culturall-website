# Override TESTS DE NON-RÉGRESSION (TNR) — environnement éphémère
# Usage : géré par scripts/tnr-docker.sh, ne pas démarrer manuellement.
#
#   docker compose -p culturall-website-tnr \
#     -f docker-compose.base.yml \
#     -f docker-compose.test.yml \
#     --env-file .env.test \
#     up --build -d
#
# Caractéristiques :
#   - Iso-prod côté images (target production), iso-preprod côté nginx (HTTP)
#   - Postgres et MinIO en tmpfs (volatile, rapide, pas de données persistées)
#   - Aucun service en restart auto

services:
  django:
    build:
      target: production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.test
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    restart: "no"

  nextjs:
    build:
      target: production
    command: node server.js
    restart: "no"

  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/preprod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
    depends_on:
      django:
        condition: service_started
      nextjs:
        condition: service_started
    restart: "no"

  postgres:
    tmpfs:
      - /var/lib/postgresql/data
    restart: "no"

  minio:
    tmpfs:
      - /data
    restart: "no"

  minio-init:
    restart: "no"

volumes:
  static_files:
  media_files:
