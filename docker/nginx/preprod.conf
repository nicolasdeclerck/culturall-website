# Nginx — pré-production / TNR (HTTP uniquement, pas de SSL)
#
# Sert :
#   - /admin/, /api/, /static/, /media/  → upstream Django (Wagtail)
#   - /                                  → upstream Next.js
#
# En production, le reverse proxy est Traefik (cf. docker-compose.prod.yml),
# pas nginx. Ce fichier n'est utilisé qu'en preprod (local) et en TNR.

upstream django_upstream {
    server django:8000;
}

upstream nextjs_upstream {
    server nextjs:3000;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 50M;

    # Django/Wagtail admin et API
    location /admin/ {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django admin (distinct de l'admin Wagtail monté sur /admin/).
    # Exposé en preprod/TNR pour pouvoir inspecter les ContactSubmission,
    # les users, etc. (cf. CONTACT-04 du cahier de tests).
    location /django-admin/ {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files Django (admin Wagtail)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Media files (en preprod : servis par nginx ; en prod via MinIO/R2 directement)
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # Frontend Next.js — tout le reste
    location / {
        proxy_pass http://nextjs_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
