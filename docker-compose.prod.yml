# Override PRODUCTION
# Usage : docker compose -p culturall-website \
#           -f docker-compose.base.yml \
#           -f docker-compose.prod.yml \
#           --env-file .env.prod up -d
#
# Caractéristiques :
#   - Images PRÉ-BUILDÉES par CI/CD (pas de build local sur le VPS)
#   - Tag d'image injecté via REGISTRY + IMAGE_TAG dans .env.prod
#   - Reverse proxy Traefik EMBARQUÉ dans ce compose (le VPS de prod est
#     dédié au site cultur-all.org : pas de Traefik externe à partager)
#   - TLS automatique via Let's Encrypt (challenge TLS-ALPN sur :443)
#   - HTTP → HTTPS forcé au niveau de l'entrypoint web
#   - Routing :
#       https://cultur-all.org/admin       → django  (Wagtail admin)
#       https://cultur-all.org/api         → django  (DRF API)
#       https://cultur-all.org/static      → django  (servi via whitenoise)
#       https://cultur-all.org/            → nextjs  (catch-all front)
#       https://www.cultur-all.org/*       → 301 → https://cultur-all.org/*
#       https://media.cultur-all.org/      → minio   (médias S3-compatible)

services:
  traefik:
    image: traefik:v3.5
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Redirect global HTTP → HTTPS au niveau entrypoint
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Let's Encrypt — challenge TLS-ALPN (port 443 uniquement, compatible
      # avec le redirect HTTP→HTTPS ci-dessus contrairement au httpchallenge)
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    restart: always

  django:
    image: ${REGISTRY}/django:${IMAGE_TAG:-latest}
    build: !reset null
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      # Forcé ici pour que gunicorn ET les `manage.py` exécutés via `docker
      # compose exec` (collectstatic, migrate) utilisent production.py. Sans
      # ça, manage.py tombe sur son défaut `config.settings.dev` et
      # collectstatic n'écrit pas le manifest staticfiles.json, ce qui casse
      # l'admin à cause de CompressedManifestStaticFilesStorage.
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    labels:
      - "traefik.enable=true"

      # Routeur backend — admin/api/static (Django + Wagtail + whitenoise)
      - "traefik.http.routers.culturall-website-back.rule=Host(`cultur-all.org`) && (PathPrefix(`/admin`) || PathPrefix(`/api`) || PathPrefix(`/static`))"
      - "traefik.http.routers.culturall-website-back.entrypoints=websecure"
      - "traefik.http.routers.culturall-website-back.tls=true"
      - "traefik.http.routers.culturall-website-back.tls.certresolver=myresolver"
      - "traefik.http.routers.culturall-website-back.priority=100"
      - "traefik.http.services.culturall-website-back.loadbalancer.server.port=8000"
    restart: always

  nextjs:
    image: ${REGISTRY}/nextjs:${IMAGE_TAG:-latest}
    build: !reset null
    command: node server.js
    labels:
      - "traefik.enable=true"

      # Routeur frontend — catch-all sur cultur-all.org
      - "traefik.http.routers.culturall-website-front.rule=Host(`cultur-all.org`)"
      - "traefik.http.routers.culturall-website-front.entrypoints=websecure"
      - "traefik.http.routers.culturall-website-front.tls=true"
      - "traefik.http.routers.culturall-website-front.tls.certresolver=myresolver"
      - "traefik.http.routers.culturall-website-front.priority=10"
      - "traefik.http.services.culturall-website-front.loadbalancer.server.port=3000"

      # Routeur www → non-www (301). Service requis par Traefik mais le
      # middleware répond avant d'atteindre nextjs.
      - "traefik.http.routers.culturall-website-www.rule=Host(`www.cultur-all.org`)"
      - "traefik.http.routers.culturall-website-www.entrypoints=websecure"
      - "traefik.http.routers.culturall-website-www.tls=true"
      - "traefik.http.routers.culturall-website-www.tls.certresolver=myresolver"
      - "traefik.http.routers.culturall-website-www.middlewares=culturall-website-www-redirect"
      - "traefik.http.routers.culturall-website-www.service=culturall-website-front"
      # Le `$$` est échappé pour docker-compose ; Traefik reçoit `${1}` (capture regex).
      - "traefik.http.middlewares.culturall-website-www-redirect.redirectregex.regex=^https://www\\.cultur-all\\.org/(.*)"
      - "traefik.http.middlewares.culturall-website-www-redirect.redirectregex.replacement=https://cultur-all.org/$${1}"
      - "traefik.http.middlewares.culturall-website-www-redirect.redirectregex.permanent=true"
    restart: always

  minio:
    labels:
      - "traefik.enable=true"

      # MinIO sur sous-domaine dédié — préfixe = bucket name
      # URL publique : https://media.cultur-all.org/<bucket>/<key>
      # où <bucket> = valeur de MINIO_BUCKET_NAME dans .env.prod.
      # (compatible avec une migration future vers Cloudflare R2 sur le
      #  même sous-domaine)
      - "traefik.http.routers.culturall-website-media.rule=Host(`media.cultur-all.org`)"
      - "traefik.http.routers.culturall-website-media.entrypoints=websecure"
      - "traefik.http.routers.culturall-website-media.tls=true"
      - "traefik.http.routers.culturall-website-media.tls.certresolver=myresolver"
      - "traefik.http.services.culturall-website-media.loadbalancer.server.port=9000"
    volumes:
      - minio_prod_data:/data
    restart: always

  postgres:
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: always

  # Override : on désactive complètement nginx en prod (Traefik fait tout)
  nginx:
    profiles: ["disabled"]

volumes:
  static_files:
  media_files:
  postgres_prod_data:
  minio_prod_data:
  traefik_letsencrypt:
