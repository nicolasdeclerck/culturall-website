{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<main class="page">
  <div class="static-page-wrapper">
    <h1>{{ page.title }}</h1>
  </div>

  {% if page.body %}
  <section class="custom-section custom-section--flexible">
    <div class="custom-section__inner">
      {% for block in page.body %}
        {% include_block block %}
      {% endfor %}
    </div>
  </section>
  {% endif %}
</main>
{% endblock %}
