{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<main class="page page--flush">
  <div class="custom-section custom-section--head">
    <div class="custom-section__inner">
      <h1>{{ page.title }}</h1>
    </div>
  </div>

  {% if page.body %}
  <section class="custom-section">
    <div class="custom-section__inner">
      {% for block in page.body %}
        {% include_block block %}
      {% endfor %}
    </div>
  </section>
  {% endif %}
</main>
{% endblock %}
