{% load wagtailimages_tags %}
<div class="illustrated-block">
    <div class="illustrated-block__text" data-aos="fade-right">
        {% if self.title %}
            <h3 class="illustrated-block__title">{{ self.title }}</h3>
        {% endif %}
        {% if self.content %}
            <div class="illustrated-block__content">
                {{ self.content }}
            </div>
        {% endif %}      
    </div>
    <div class="illustrated-block__illustration" data-aos="fade-left" data-aos-delay="150">
        {% if self.image %}
            {% image self.image fill-600x400 class="illustrated-block__image" alt=self.title loading="lazy" %}
        {% endif %}
    </div>
</div>
